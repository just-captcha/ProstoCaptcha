# ProstoCaptcha Core
# =========================================
# RU/EN config
# language: ru | en
# =========================================

settings:
  # RU: Язык плагина (ru/en)
  # EN: Plugin language (ru/en)
  language: ru

timings:
  # RU: Время на ввод капчи (сек)
  # EN: Time to solve captcha (seconds)
  captcha-seconds: 25

  # RU: Длительность проверки падения (сек)
  # EN: Fall-check stage duration (seconds)
  fall-check-seconds: 3

  # RU: Защита от спама кликами (мс)
  # EN: Click spam protection cooldown (ms)
  interact-cooldown-ms: 300

  # RU: Минимальная пауза между "открыл/закрыл" повторным кликом (мс)
  # EN: Minimum delay for second click on open/close tasks (ms)
  close-reclick-ms: 450

captcha:
  # RU: Длина кода капчи
  # EN: Captcha code length
  code-length: 6

  # RU: Алфавит символов для капчи
  # EN: Captcha character alphabet
  alphabet: "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789"

security:
  # RU: Минимальная дистанция падения для зачёта
  # EN: Minimum fall distance to pass
  min-fall-distance: 8

  # RU: Кикать за неверные действия (не тот блок/интерфейс)
  # EN: Kick on wrong action (wrong block/open target)
  kick-on-wrong-action: true

world:
  # RU: Высота сцены с капчей-картой
  # EN: Y-level of captcha map stage
  map-y: 250

  # RU: Высота этапа падения
  # EN: Y-level of fall-check stage
  fall-y: 215

  # RU: Если игрок падает ниже, вернуть на остров
  # EN: Teleport player back to island if below this Y
  island-min-y: 58

performance:
  # RU: Режим для слабых хостов (меньше RAM/CPU)
  # EN: Low-memory mode for weak hosts
  low-memory-mode: true

  # RU: Радиус предзагрузки чанков карты
  # EN: Map chunk preload radius
  map-chunk-preload-radius: 1

  # RU: Радиус предзагрузки чанков острова
  # EN: Island chunk preload radius
  island-chunk-preload-radius: 2

  # RU: Размер кэша последних заданий игроков
  # EN: Last-task cache size
  max-last-task-cache: 1024

  decor:
    # RU: Дополнительный декор острова
    # EN: Extra island decoration
    enabled: false

anti-vpn:
  # RU: Включить проверку VPN/Proxy
  # EN: Enable VPN/Proxy check
  enabled: true

  # RU: true = если API недоступны, пускать игрока
  # EN: true = allow player if providers are unavailable
  fail-open: true

  # RU: Таймаут HTTP запроса к провайдерам (мс)
  # EN: HTTP timeout for providers (ms)
  timeout-ms: 2500

  # RU: Время кэша решения по IP (сек)
  # EN: Decision cache TTL per IP (seconds)
  cache-seconds: 21600

  # RU: Максимум записей в anti-vpn кэше
  # EN: Maximum entries in anti-vpn cache
  cache-max-entries: 2048

  # RU: Белый список IP через запятую
  # EN: Comma-separated IP whitelist
  whitelist-ips: ""

  # RU: Белый список ников через запятую
  # EN: Comma-separated nickname whitelist
  whitelist-nicks: ""

  # RU: Сообщение кика. Плейсхолдеры: {ip} {provider} {reason}
  # EN: Kick message. Placeholders: {ip} {provider} {reason}
  kick-message: "<gradient:#FB7185:#EF4444><bold>✖ VPN/Proxy detected.</bold></gradient><newline><gray>IP: <white>{ip}</white> • Provider: <white>{provider}</white> • Reason: <white>{reason}</white></gray>"

  providers:
    proxycheck:
      enabled: true
      url: "https://proxycheck.io/v2/%ip%?vpn=1&risk=1&asn=1"
      api-key: ""
      block-vpn: true
      block-proxy: true
      block-tor: true
      block-hosting: true
      risk-threshold: 66

    ip-api:
      enabled: true
      url: "http://ip-api.com/json/%ip%?fields=status,message,proxy,hosting,query"
      block-proxy: true
      block-hosting: true

tasks:
  # RU: Максимум количества для задач ломания (1..N)
  # EN: Max required count for break tasks (1..N)
  break-required-max: 3

messages:
  ru:
    prefix: "<gradient:#22D3EE:#A78BFA><bold>Анти-бот</bold></gradient> <gray>»</gray> "

    stage1-title: "<gradient:#67E8F9:#22D3EE><bold>КАПЧА</bold></gradient>"
    stage1-subtitle: "<white>Введи код с карты в чат</white>"

    timer-title: "<gradient:#FDE68A:#F59E0B><bold>ПРОВЕРКА</bold></gradient>"
    timer-subtitle: "<white>3...2...1...</white>"
    timer-start: "<white>⏳ <yellow>{seconds}</yellow> сек.</white>"
    timer-actionbar: "<gradient:#FDE68A:#F59E0B>⏳ {seconds}</gradient>"
    timer-boss: "<gradient:#FDE68A:#F59E0B>Проверка...</gradient>"

    captcha-start: "<gray>🧩</gray> <white>Введи код с карты. Время: <yellow>{seconds}</yellow> сек.</white>"
    captcha-wrong: "<red>✖ Неверная капча.</red> <white>Выдана новая.</white>"
    captcha-ok: "<green>✔ Капча принята.</green> <white>Переход к следующему этапу.</white>"
    captcha-timeout: "<red>⏰ Время на капчу вышло. Перезайди.</red>"
    captcha-image-error: "<yellow>⚠ Не удалось отправить карту, пробую снова.</yellow>"
    captcha-fail-limit: "<gradient:#FB7185:#EF4444><bold>✖ 3/3 ошибок капчи. Подключись снова.</bold></gradient>"
    anti-vpn-kick: "<gradient:#FB7185:#EF4444><bold>✖ Обнаружен VPN/Proxy. Доступ закрыт.</bold></gradient><newline><gray>IP: <white>{ip}</white> • Провайдер: <white>{provider}</white> • Причина: <white>{reason}</white></gray>"

    quest-start: "<gray>⚒</gray> <white>Этап заданий начат.</white>"
    quest-next: "<gradient:#86EFAC:#22C55E>{task}</gradient> <gray>({current}/{required})</gray>"
    quest-step-done: "<green>✔ Задание выполнено.</green>"
    quest-all-done: "<gradient:#86EFAC:#22C55E><bold>Проверка пройдена. Передаю в авторизацию...</bold></gradient>"
    quest-fall-teleport: "<yellow>Ты упал с острова. Возврат на точку проверки.</yellow>"

    wait-close: "<gray>Закрой интерфейс (ESC) и нажми по нужному блоку снова.</gray>"
    wrong-block: "<gradient:#FB7185:#EF4444><bold>✖ Нарушение: сломан неверный блок. Доступ закрыт.</bold></gradient>"
    wrong-open: "<gradient:#FB7185:#EF4444><bold>✖ Нарушение: открыт неверный объект. Доступ закрыт.</bold></gradient>"
    suspicious: "<gradient:#FB7185:#EF4444><bold>✖ Подозрительная активность. Переподключись.</bold></gradient>"
    fall-failed: "<red>Проверка не пройдена.</red>"

    boss-map: "<gradient:#67E8F9:#22D3EE>Капча: соблюдай регистр букв</gradient>"
    boss-fall: "<gradient:#FDE68A:#F59E0B>Проверка...</gradient>"
    boss-quest: "<gradient:#86EFAC:#22C55E>{task} ({current}/{required})</gradient>"
    boss-ready: "<gradient:#22D3EE:#A78BFA>Анти-бот: подготовка...</gradient>"

    tasks:
      break-log: "Сломай дерево"
      break-stone: "Добудь камень"
      break-iron: "Добудь железо"
      break-coal: "Добудь уголь"
      break-diamond: "Добудь алмаз"
      craft-planks: "Сделай доски"
      smelt-iron: "Переплавь железо"
      craft-item: "Скрафти предмет"
